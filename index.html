<style>
:root {
  --bg:#f6f7f9; --card:#fff; --muted:#667085; --line:#e9ecef;
  --shadow:0 2px 10px rgba(0,0,0,.06); --accent:#173b63; --accent2:#2d6a4f;
}
* { box-sizing:border-box; }
body { font-family:Arial, sans-serif; margin:18px; background:var(--bg); color:#101828; }
h1 { margin:0 0 6px; font-size:24px; }
.sub { color:var(--muted); margin:0 0 16px; }
.tabs { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.tab-btn {
  border:1px solid var(--line); background:#fff; border-radius:12px; padding:10px 14px;
  cursor:pointer; font-weight:700;
}
.tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.grid { display:grid; grid-template-columns:1.2fr 0.8fr; gap:14px; }
.row { display:flex; gap:14px; flex-wrap:wrap; }
.row > * { flex:1; min-width:320px; }
.card { background:var(--card); border-radius:14px; padding:14px; box-shadow:var(--shadow); border:1px solid #f0f0f0; }
.kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.kpi { padding:12px; border-radius:12px; background:#fafafa; border:1px solid var(--line); }
.kpi .label { font-size:12px; color:var(--muted); }
.kpi .value { font-size:20px; font-weight:800; margin-top:4px; }
.controls { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
label { font-size:12px; color:var(--muted); display:block; margin-bottom:6px; }
select { width:100%; padding:10px; border-radius:12px; border:1px solid var(--line); background:#fff; }
.control { flex:1; min-width:220px; }
.alert { padding:10px; border-radius:12px; border:1px solid var(--line); background:#fff; margin-top:10px; }
.alert.info { background:#f8fbff; }
.badge {
  display:inline-block; padding:4px 8px; border-radius:999px; background:#eef2f6;
  color:#344054; font-size:12px; margin-right:6px;
}
table { width:100%; border-collapse:collapse; }
th, td { padding:8px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:top; }
th { text-align:left; color:#475467; }
.muted { color:var(--muted); font-size:12px; }
canvas { max-height:360px; }
@media (max-width:980px) { .grid { grid-template-columns:1fr; } .kpis { grid-template-columns:repeat(2,1fr); } }
</style>
</head>

function fillSelect(el, items, placeholder) {
  el.innerHTML = "";
  const o = document.createElement("option");
  o.value = "";
  o.textContent = placeholder;
  el.appendChild(o);
  items.forEach(v => {
    const opt = document.createElement("option");

    opt.textContent = v;
    el.appendChild(opt);
  });
}

function totalsProdByYear() {
  const tot = {};
  currentData().forEach(r => {
    const y = String(r.Ano);
    tot[y] = (tot[y] || 0) + toInt(r.Total);
  });
  return tot;
}

function totalsFinanceByYear() {
  const tot = {};
  if (currentTab === "aps") {
    REP_DATA.forEach(r => {
      const y = String(r.Ano);
      tot[y] = (tot[y] || 0) + toFloat(r.Valor);
    });
  } else {
    ["2023","2024","2025","2026"].forEach(y => tot[y] = 0);
  }
  return tot;
}

function monthlyProd(year) {
  const out = months.map(() => 0);
  currentData().filter(r => String(r.Ano) === String(year))
    .forEach(r => months.forEach((m, i) => out[i] += toInt(r[m])));
  return out;
}

function monthlyFinance(year) {
  const out = months.map(() => 0);
  if (currentTab === "aps") {
    REP_DATA.filter(r => String(r.Ano) === String(year))
      .forEach(r => {
        const idx = toInt(r.MesNum) - 1;
        if (idx >= 0 && idx < 12) out[idx] += toFloat(r.Valor);
      });
  }
  return out;
}

function unitMonthly(year, unidade) {
  const clean = String(unidade || "").trim();
  const r = currentData().find(x => String(x.Ano) === String(year) && String(x.Unidade).trim() === clean);
  return months.map(m => r ? toInt(r[m]) : 0);
}

function getUnitsForYear(year) {
  return [...new Set(
    currentData()
      .filter(r => String(r.Ano) === String(year))
      .map(r => String(r.Unidade).trim())
  )].sort((a,b) => a.localeCompare(b, 'pt-BR'));
}

  const at = tp[year] || 0;
  const fin = tf[year] || 0;
  const c = document.getElementById("alertCusto");
  if (currentTab === "aps" && at > 0 && fin > 0) {
    <!--c.innerHTML = `<b>Custo médio por atendimento (${year}):</b> ${money.format(fin / at)} <div class="muted">Estimativa: repasses APS / atendimentos do bloco atual.</div>`;-->
  } else if (currentTab === "aps") {
    c.innerHTML = `<b>Indicador financeiro:</b> <span class="muted">indisponível.</span>`;
  } else {
    c.innerHTML = `<b>Indicador financeiro:</b> <span class="muted">valores zerados temporariamente até futura alimentação por MAC/FAEC/contratos.</span>`;
  }
}

function renderCharts() {
  const tp = totalsProdByYear();
  const years = Object.keys(tp).sort();
  const prodData = years.map(y => tp[y]);

  if (chartAnoProd) chartAnoProd.destroy();
  chartAnoProd = new Chart(document.getElementById("chartAnoProd"), {
    type:"bar",
    data:{ labels:years, datasets:[{ label:`Atendimentos – ${currentCfg().nome}`, data:prodData }] },
    options:{ responsive:true, plugins:{ legend:{ display:false } } }
  });

  const tf = totalsFinanceByYear();
  const finData = years.map(y => tf[y] || 0);

  if (chartAnoRep) chartAnoRep.destroy();
  chartAnoRep = new Chart(document.getElementById("chartAnoRep"), {
    type:"bar",
    data:{ labels:years, datasets:[{ label:`Financeiro – ${currentCfg().nome}`, data:finData }] },
    options:{ responsive:true, plugins:{ legend:{ display:false } } }
  });
}

function renderMonthly() {
  const year = document.getElementById("selAno").value;

  if (chartMesMunicipio) chartMesMunicipio.destroy();
  chartMesMunicipio = new Chart(document.getElementById("chartMesMunicipio"), {
    type:"line",
    data:{ labels:months, datasets:[{ label:`${currentCfg().nome} – ${year}`, data:monthlyProd(year) }] },
    options:{ responsive:true }
  });

  if (chartMesRep) chartMesRep.destroy();
  chartMesRep = new Chart(document.getElementById("chartMesRep"), {
    type:"line",
    data:{ labels:months, datasets:[{ label:`Financeiro – ${year}`, data:monthlyFinance(year) }] },
    options:{ responsive:true }
  });
}

function renderRanking() {
  const year = document.getElementById("selAno").value;
  const prev = String(parseInt(year, 10) - 1);
  const rows = currentData().filter(r => String(r.Ano) === String(year));
  const total = rows.reduce((acc, r) => acc + toInt(r.Total), 0);

  const prevMap = {};
  currentData().filter(r => String(r.Ano) === String(prev))
    .forEach(r => prevMap[String(r.Unidade).trim()] = toInt(r.Total));

  const sorted = [...rows].sort((a, b) => toInt(b.Total) - toInt(a.Total)).slice(0, 5);
  const tbody = document.getElementById("rankBody");
  tbody.innerHTML = "";

  sorted.forEach((r, idx) => {
    const val = toInt(r.Total);
    const pct = total ? (val / total) * 100 : 0;
    const prevTotal = prevMap[String(r.Unidade).trim()] ?? 0;
    let deltaTxt = "—";
    if (prevTotal > 0) {
      const d = ((val - prevTotal) / prevTotal) * 100;
      const sign = d >= 0 ? "+" : "";
      deltaTxt = `${sign}${d.toFixed(1)}%`;
    }
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${idx+1}</td><td>${r.Unidade}</td><td>${formatBR(val)}</td><td>${pct.toFixed(1)}%</td><td>${deltaTxt}</td>`;
    tbody.appendChild(tr);
  });
}

function renderUnitChart() {
  const year = document.getElementById("selAno").value;
  const un = document.getElementById("selUnidade").value;
  const titleEl = document.getElementById("unitTitle");
  const highlight = document.getElementById("unitHighlight");

  if (titleEl) titleEl.textContent = un ? `${un} (${year})` : "ano selecionado";
  if (highlight) highlight.textContent = un ? `Unidade selecionada: ${un}` : "";
  if (!un) return;

  const data = unitMonthly(year, un);

  if (chartMesUnidade) chartMesUnidade.destroy();
  chartMesUnidade = new Chart(document.getElementById("chartMesUnidade"), {
    type:"bar",
    data:{ labels:months, datasets:[{ label:`${un} – ${year}`, data:data }] },
    options:{ responsive:true, plugins:{ legend:{ display:false } } }
  });
}

function refreshFilters() {
  const years = Object.keys(totalsProdByYear()).sort();
  const selAno = document.getElementById("selAno");
  const prefer = years.includes("2024") ? "2024" : (years[years.length - 1] || "");
  fillSelect(selAno, years, "Selecione");
  selAno.value = prefer;

  const unidades = getUnitsForYear(selAno.value);
  const selUn = document.getElementById("selUnidade");
  fillSelect(selUn, unidades, "Selecione");
  selUn.value = unidades[0] || "";
}

function bindEvents() {
  document.getElementById("selAno").addEventListener("change", () => {
    const year = document.getElementById("selAno").value;
    if (!year) return;
    const unidades = getUnitsForYear(year);
    const selUn = document.getElementById("selUnidade");
    fillSelect(selUn, unidades, "Selecione");
    selUn.value = unidades[0] || "";
    renderKPIs();
    renderMonthly();
    renderRanking();
    renderUnitChart();
  });

  document.getElementById("selUnidade").addEventListener("change", () => {
    renderUnitChart();
  });
}

function initPanel() {
  layout();
  refreshFilters();
  bindEvents();
  renderKPIs();
  renderCharts();
  renderMonthly();
  renderRanking();
  renderUnitChart();
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTab = btn.dataset.tab;
    initPanel();
  });
});

initPanel();
</script>
</body>
</html>
